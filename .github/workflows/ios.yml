name: Bump Version, Build, and Deploy to App Store

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "14.x"

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Increment version
        id: bump-version
        run: |
          # Extract current version from app.json
          current_version=$(jq -r '.expo.version' app.json)
          # Split version into an array
          IFS='.' read -r -a version_parts <<< "$current_version"
          # Increment the patch version
          ((version_parts[2]++))
          # Join array back into a version string
          new_version="${version_parts[0]}.${version_parts[1]}.${version_parts[2]}"
          echo "New version: $new_version"
          # Update app.json with the new version
          jq --arg new_version "$new_version" '.expo.version = $new_version' app.json > tmp.$$.json && mv tmp.$$.json app.json
          # Update package.json with the new version if needed
          if [ -f package.json ]; then
            jq --arg new_version "$new_version" '.version = $new_version' package.json > tmp.$$.json && mv tmp.$$.json package.json
          fi

      - name: Commit version bump
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app.json
          if [ -f package.json ]; then git add package.json; fi
          git commit -m "chore: bump version to $new_version"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git push origin HEAD:main

  build-and-deploy:
    needs: bump-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "14.x"

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Log in to Expo
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          expo login --token $EXPO_TOKEN

      - name: Configure EAS
        run: eas configure

      - name: EAS build for iOS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_PROFILE: production
        run: |
          eas build --platform ios --profile production --non-interactive

      - name: Upload to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Submitting to TestFlight..."
          eas submit --platform ios --profile production --latest --apple-id $APPLE_ID --apple-team-id $APPLE_TEAM_ID --asc-app-id $APPLE_APP_SPECIFIC_PASSWORD --non-interactive || {
            echo "Submission failed. Debug information:";
            cat .eas/eas.log;
            exit 1;
          }
