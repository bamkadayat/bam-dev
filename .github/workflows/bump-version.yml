name: Bump Version and Commit

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14.x'

      - name: Increment version
        id: bump-version
        run: |
          # Extract current version from app.json
          current_version=$(jq -r '.expo.version' app.json)
          # Split version into an array
          IFS='.' read -r -a version_parts <<< "$current_version"
          # Increment the patch version
          ((version_parts[2]++))
          # Join array back into a version string
          new_version="${version_parts[0]}.${version_parts[1]}.${version_parts[2]}"
          echo "New version: $new_version"
          # Update app.json with the new version
          jq --arg new_version "$new_version" '.expo.version = $new_version' app.json > tmp.$$.json && mv tmp.$$.json app.json
          # Update package.json with the new version if needed
          if [ -f package.json ]; then
            jq --arg new_version "$new_version" '.version = $new_version' package.json > tmp.$$.json && mv tmp.$$.json package.json
          fi

      - name: Commit version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app.json
          if [ -f package.json ]; then git add package.json; fi
          git commit -m "chore: bump version to ${{ steps.bump-version.outputs.new_version }}"
          git push
